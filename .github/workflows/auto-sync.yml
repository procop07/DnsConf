name: Auto Sync Fork

on:
  schedule:
    # Запуск каждый день в полночь по UTC (00:00)
    - cron: '0 0 * * *'
  workflow_dispatch: # Позволяет запустить синхронизацию вручную кнопкой

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Разрешаем боту вносить изменения в наш репозиторий

    steps:
      - name: Sync fork with upstream
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Эта команда делает то же самое, что кнопка "Sync fork" в интерфейсе
          gh repo sync ${{ github.repository }} -b main
